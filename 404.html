<!DOCTYPE html>
<html>
  <head>
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = '/?path=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirect);
    </script>
  </head>
  <body></body>
</html>
